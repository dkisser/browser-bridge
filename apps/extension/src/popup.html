<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Bridge</title>
    <style>
      body {
        width: 280px;
        padding: 16px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 15px;
      }
      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ccc;
      }
      .dot.connected { background: #4caf50; }
      .dot.disconnected { background: #f44336; }
      .label {
        font-size: 15px;
        color: #333;
      }
      .browser-id-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      .browser-id-label {
        font-size: 12px;
        font-weight: 600;
        color: #888;
        flex-shrink: 0;
      }
      .browser-id {
        font-size: 13px;
        color: #666;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: #ccc;
        border-radius: 22px;
        transition: background-color 0.2s;
      }
      .toggle-slider::before {
        content: '';
        position: absolute;
        height: 18px;
        width: 18px;
        left: 2px;
        bottom: 2px;
        background-color: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      .toggle-switch input:checked + .toggle-slider {
        background-color: #4caf50;
      }
      .toggle-switch input:checked + .toggle-slider::before {
        transform: translateX(18px);
      }
      .toggle-switch input:disabled + .toggle-slider {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .message {
        font-size: 12px;
        color: #f44336;
        min-height: 16px;
      }
      .hint {
        font-size: 15px;
        color: #171717;
        margin-top: 12px;
      }
      button {
        width: 100%;
        padding: 8px;
        cursor: pointer;
        margin-bottom: 8px;
      }
      #result {
        margin-top: 8px;
        word-break: break-word;
        font-size: 12px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="status-row">
      <div class="status">
        <div id="statusDot" class="dot disconnected"></div>
        <span id="statusLabel" class="label">Disconnected</span>
      </div>
      <label class="toggle-switch">
        <input id="cloudSwitch" type="checkbox" />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="browser-id-row">
      <span class="browser-id-label">UID:</span>
      <div id="browserId" class="browser-id"></div>
    </div>
    <div id="message" class="message"></div>
    <div class="hint">Now, you can use your agent to control the browser just like you.</div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
