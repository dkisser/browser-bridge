name: base-check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system test dependencies
        run: sudo apt-get update && sudo apt-get install -y bats unzip zip

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Run unit/integration tests
        run: bun run test

      - name: Run install/bridge bats tests
        run: bun run test:install
